# Server
server.port=8080

# Database - PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskflow}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:taskflow_super_secret_jwt_key_2024_make_it_long_enough_for_hs256}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# AI Service - Google Gemini
app.ai.gemini.api-key=${GEMINI_API_KEY:your-gemini-api-key-here}
app.ai.gemini.base-url=https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.com.taskflow=DEBUG
logging.level.org.springframework.security=WARN
